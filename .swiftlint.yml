# cSpell: ignore xctest, iboutlet

excluded:
  - .build
  - CountThatUITests/SnapshotHelper.swift

disabled_rules:
  - closure_parameter_position
  - comment_spacing
  - multiple_closures_with_trailing_closure
  - opening_brace
  - trailing_comma
  - trailing_newline

strict: false

analyzer_rules:
  - unused_declaration
  - unused_import
  - capture_variable

opt_in_rules:
  - accessibility_label_for_image
  - accessibility_trait_for_button
  - empty_xctest_method
  - discouraged_optional_collection
  - fatal_error_message
  - force_unwrapping
  - implicitly_unwrapped_optional
  - prefer_self_in_static_references
  - reduce_into
  - sorted_first_last
  - strong_iboutlet
  - unowned_variable_capture

identifier_name:
  excluded:
    - db
    - id
    - url

type_name:
  max_length: 45

# relax the linter rules a bit from the default (50)
function_body_length: 65

# match the default line length from `swift format`
line_length: 100
